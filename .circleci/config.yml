# .circleci/config.yml
version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14
    working_directory: ~/repo

jobs:
  lint-and-format:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package-lock.json" }}
      - run: npm run lint
      - run: npm run format:check
      - run: npm run check:req

  unit-tests:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Run unit tests with coverage
          command: npm run test:coverage
      - store_test_results:
          path: test-results/unit
      - store_artifacts:
          path: coverage
          destination: coverage-report

  api-tests:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Run API contract tests
          command: npm run test:api
      - store_test_results:
          path: test-results/api

  e2e-tests:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Install Playwright browsers
          command: npx playwright install --with-deps
      - run:
          name: Install Java (required for Allure)
          command: |
            sudo apt-get update
            sudo apt-get install -y default-jre-headless
      - run:
          name: Run Playwright E2E tests
          command: npm run test:e2e
          when: always
      - run:
          name: Generate Allure report
          command: npm run allure:generate
          when: always
      - store_test_results:
          path: test-results/e2e
      - store_artifacts:
          path: allure-report
          destination: allure-report
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
      - store_artifacts:
          path: test-results
          destination: test-results

  deploy:
    executor: node-executor
    steps:
      - checkout
      # Intentionally skipping npm ci and cache restore/save – Vercel builds remotely
      - run:
          name: Install Vercel CLI
          command: npm install -g vercel
      - run:
          name: Deploy to Vercel (Preview for develop, Production for main)
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              vercel pull --yes --environment=production --token=$VERCEL_TOKEN
              vercel build --prod --token=$VERCEL_TOKEN
              vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
            else
              vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
              vercel build --token=$VERCEL_TOKEN
              vercel deploy --prebuilt --token=$VERCEL_TOKEN
            fi

workflows:
  # version: 2
  ci-Test-and-Deploy:
    jobs:
      - lint-and-format
      - unit-tests:
          requires:
            - lint-and-format
      - api-tests:
          requires:
            - unit-tests
      - e2e-tests:
          requires:
            - api-tests
      - deploy:
          requires:
            - e2e-tests
          filters:
            branches:
              only:
                - main
                - develop
